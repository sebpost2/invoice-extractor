name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Dummy values are enough — Prisma only opens a real connection at
    # request time and Groq is never called during lint/typecheck/build.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      GROQ_API_KEY: "ci-dummy"
      VOYAGE_API_KEY: "ci-dummy"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Prisma 7 requires Node ^20.19 || ^22.12 || >=24 — 20.9 is too old.
          node-version: "22"
          cache: npm

      # Use `npm install`, not `npm ci`. The lock file is generated on Windows,
      # where npm omits the Linux-only bundled deps of @tailwindcss/oxide's wasm
      # fallback (@emnapi/core, @emnapi/runtime). `npm ci` is strict and aborts on
      # Linux with "Missing: @emnapi/... from lock file"; `npm install` reconciles
      # it. postinstall (= prisma generate) still runs.
      - name: Install deps (runs postinstall = prisma generate)
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
